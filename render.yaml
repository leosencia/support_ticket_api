# Render Blueprint — https://render.com/docs/blueprint-spec
#
# API-only Rails: do NOT run `rails` or `rake assets:precompile` in buildCommand
# (bare `rails` uses Bundler’s .gems/bin stub and can raise Gem::GemNotFoundException for railties).
#
# Free tier: Pre-Deploy is often unavailable — migrate in startCommand instead.
# Dashboard: Build = bundle install | Start = same as startCommand below (or use this blueprint).

services:
  - type: web
    name: support-ticket-api
    runtime: ruby
    buildCommand: bundle install
    startCommand: RAILS_ENV=production bundle exec rails db:migrate && bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
